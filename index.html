<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://marz-souqone.netlify.app/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SouqOne Studio - Showroom Catalog Photos from Phone Pictures</title>
    <meta
      name="description"
      content="SouqOne Studio helps Hyderabad sellers turn phone photos into showroom catalog images and AI ad creatives. Starting Rs 149 for 5 professional images, with a free WhatsApp sample before payment."
    />
    <meta
      name="keywords"
      content="SouqOne Studio, Hyderabad sellers, WhatsApp catalog service, AI ads services, product photo editing, showroom catalog images, jewelry photos, clothing photos, furniture photos"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://marz-souqone.netlify.app/" />
    <meta property="og:title" content="SouqOne Studio - Phone Photos to Showroom Catalogs" />
    <meta
      property="og:description"
      content="Starting Rs 149 for 5 professional images. Get a free WhatsApp sample before you pay."
    />
    <meta property="og:image" content="https://marz-souqone.netlify.app/samples/showcase-earrings.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SouqOne Studio - Phone Photos to Showroom Catalogs" />
    <meta
      name="twitter:description"
      content="Starting Rs 149 for 5 professional images. Get a free WhatsApp sample before you pay."
    />
    <meta name="twitter:image" content="https://marz-souqone.netlify.app/samples/showcase-earrings.jpg" />
  </head>
  <body>
    <form
      name="pilot-application"
      method="POST"
      netlify
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      action="/thank-you"
      hidden
    >
      <input type="hidden" name="form-name" value="pilot-application" />
      <input name="bot-field" />
      <input name="full_name" />
      <input name="shop_name" />
      <input name="whatsapp" />
      <input name="area" />
      <select name="category">
        <option>Jewelry</option>
        <option>Bangles</option>
        <option>Pearls</option>
        <option>Boutique</option>
        <option>Clothing</option>
        <option>Furniture</option>
        <option>Accessories</option>
        <option>Other</option>
      </select>
      <select name="monthly_photos">
        <option>Below 30</option>
        <option>30-100</option>
        <option>100-200</option>
        <option>200+</option>
      </select>
      <select name="plan">
        <option>Starter - ₹149</option>
        <option>Small - ₹599</option>
        <option>Medium - ₹999</option>
        <option>Mega - ₹4,999</option>
        <option>Need guidance</option>
      </select>
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
