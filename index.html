<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SouqOne Studio - Showroom-Ready Product Images & Catalogs for Hyderabad Sellers</title>
    <meta
      name="description"
      content="SouqOne Studio by MARZ helps Hyderabad jewelry, bangles, pearls, boutique, and local sellers turn normal mobile product photos into showroom-ready images, WhatsApp cards, and PDF catalogs."
    />
    <meta
      name="keywords"
      content="Hyderabad product photography, jewelry catalog design Hyderabad, WhatsApp catalog service, AI product photo enhancement, bangle catalog Hyderabad, local seller digital catalog, SouqOne Studio, MARZ Enterprises & Solutions"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SouqOne Studio - WhatsApp-First Product Catalog Service" />
    <meta
      property="og:description"
      content="AI-assisted product image enhancement and catalog creation for local Hyderabad sellers, built under SouqOne by MARZ."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SouqOne Studio - WhatsApp-First Product Catalog Service" />
    <meta
      name="twitter:description"
      content="AI-assisted product image enhancement and catalog creation for local Hyderabad sellers, built under SouqOne by MARZ."
    />
  </head>
  <body>
    <form
      name="pilot-application"
      method="POST"
      netlify
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      action="/thank-you"
      hidden
    >
      <input type="hidden" name="form-name" value="pilot-application" />
      <input name="bot-field" />
      <input name="full_name" />
      <input name="shop_name" />
      <input name="whatsapp" />
      <input name="area" />
      <select name="category">
        <option>Jewelry</option>
        <option>Bangles</option>
        <option>Pearls</option>
        <option>Boutique</option>
        <option>Accessories</option>
        <option>Other</option>
      </select>
      <select name="monthly_photos">
        <option>Below 30</option>
        <option>30-100</option>
        <option>100-200</option>
        <option>200+</option>
      </select>
      <select name="plan">
        <option>Go To Pilot - Rs 149</option>
        <option>Starter Seller - Rs 999</option>
        <option>Shop Seller - Rs 2,999</option>
        <option>Premium Catalog Pack - Rs 4,999</option>
        <option>Need guidance</option>
      </select>
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
