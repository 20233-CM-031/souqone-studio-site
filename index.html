<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MARZ Enterprises & Solutions - Ethical AI Commerce Systems</title>
    <meta
      name="description"
      content="MARZ Enterprises & Solutions builds ethical AI and digital commerce systems. SouqOne begins with SouqOne Studio, a WhatsApp-first visual commerce pilot for local sellers."
    />
    <meta
      name="keywords"
      content="MARZ Enterprises, ethical AI commerce, SouqOne, SouqOne Studio, Hyderabad sellers, WhatsApp catalog service, AI product photo enhancement, local seller digital catalog"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MARZ Enterprises & Solutions - Ethical AI Commerce Systems" />
    <meta
      property="og:description"
      content="Ethical AI and digital commerce systems for real-world businesses, starting with SouqOne Studio for local sellers."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MARZ Enterprises & Solutions - Ethical AI Commerce Systems" />
    <meta
      name="twitter:description"
      content="Ethical AI and digital commerce systems for real-world businesses, starting with SouqOne Studio for local sellers."
    />
  </head>
  <body>
    <form
      name="pilot-application"
      method="POST"
      netlify
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      action="/thank-you"
      hidden
    >
      <input type="hidden" name="form-name" value="pilot-application" />
      <input name="bot-field" />
      <input name="full_name" />
      <input name="shop_name" />
      <input name="whatsapp" />
      <input name="area" />
      <select name="category">
        <option>Jewelry</option>
        <option>Bangles</option>
        <option>Pearls</option>
        <option>Boutique</option>
        <option>Accessories</option>
        <option>Other</option>
      </select>
      <select name="monthly_photos">
        <option>Below 30</option>
        <option>30-100</option>
        <option>100-200</option>
        <option>200+</option>
      </select>
      <select name="plan">
        <option>Go To Pilot - Rs 149</option>
        <option>Starter Seller - Rs 999</option>
        <option>Shop Seller - Rs 2,999</option>
        <option>Premium Catalog Pack - Rs 4,999</option>
        <option>Need guidance</option>
      </select>
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
